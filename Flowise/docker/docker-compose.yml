version: '3.1'

services:
    flowise:
        image: flowiseai/flowise:latest
        restart: always
        environment:
            - PORT=${PORT:-3000}
            - ML_API_URL=${ML_API_URL:-http://ml-api:8503}
            - ML_API_TOKEN=${ML_API_TOKEN:-}
            - EVAL_API_URL=${EVAL_API_URL:-http://eval-api:8504}
            - EVAL_API_TOKEN=${EVAL_API_TOKEN:-}

            # DATABASE (defaults para dev local)
            - DATABASE_PATH=${DATABASE_PATH:-/root/.flowise}
            - DATABASE_TYPE=${DATABASE_TYPE:-}
            - DATABASE_PORT=${DATABASE_PORT:-}
            - DATABASE_HOST=${DATABASE_HOST:-}
            - DATABASE_NAME=${DATABASE_NAME:-}
            - DATABASE_USER=${DATABASE_USER:-}
            - DATABASE_PASSWORD=${DATABASE_PASSWORD:-}
            - DATABASE_SSL=${DATABASE_SSL:-}
            - DATABASE_SSL_KEY_BASE64=${DATABASE_SSL_KEY_BASE64:-}

            # SECRET KEYS
            - SECRETKEY_STORAGE_TYPE=${SECRETKEY_STORAGE_TYPE:-local}
            - SECRETKEY_PATH=${SECRETKEY_PATH:-/root/.flowise}
            - FLOWISE_SECRETKEY_OVERWRITE=${FLOWISE_SECRETKEY_OVERWRITE}
            - SECRETKEY_AWS_ACCESS_KEY=${SECRETKEY_AWS_ACCESS_KEY}
            - SECRETKEY_AWS_SECRET_KEY=${SECRETKEY_AWS_SECRET_KEY}
            - SECRETKEY_AWS_REGION=${SECRETKEY_AWS_REGION}
            - SECRETKEY_AWS_NAME=${SECRETKEY_AWS_NAME}

            # LOGGING
            - DEBUG=${DEBUG:-}
            - LOG_PATH=${LOG_PATH:-/root/.flowise/logs}
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - LOG_SANITIZE_BODY_FIELDS=${LOG_SANITIZE_BODY_FIELDS}
            - LOG_SANITIZE_HEADER_FIELDS=${LOG_SANITIZE_HEADER_FIELDS}

            # CUSTOM TOOL/FUNCTION DEPENDENCIES
            - TOOL_FUNCTION_BUILTIN_DEP=${TOOL_FUNCTION_BUILTIN_DEP}
            - TOOL_FUNCTION_EXTERNAL_DEP=${TOOL_FUNCTION_EXTERNAL_DEP}
            - ALLOW_BUILTIN_DEP=${ALLOW_BUILTIN_DEP}

            # STORAGE
            - STORAGE_TYPE=${STORAGE_TYPE:-local}
            - BLOB_STORAGE_PATH=${BLOB_STORAGE_PATH:-/root/.flowise/storage}
            - S3_STORAGE_BUCKET_NAME=${S3_STORAGE_BUCKET_NAME}
            - S3_STORAGE_ACCESS_KEY_ID=${S3_STORAGE_ACCESS_KEY_ID}
            - S3_STORAGE_SECRET_ACCESS_KEY=${S3_STORAGE_SECRET_ACCESS_KEY}
            - S3_STORAGE_REGION=${S3_STORAGE_REGION}
            - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
            - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
            - GOOGLE_CLOUD_STORAGE_CREDENTIAL=${GOOGLE_CLOUD_STORAGE_CREDENTIAL}
            - GOOGLE_CLOUD_STORAGE_PROJ_ID=${GOOGLE_CLOUD_STORAGE_PROJ_ID}
            - GOOGLE_CLOUD_STORAGE_BUCKET_NAME=${GOOGLE_CLOUD_STORAGE_BUCKET_NAME}
            - GOOGLE_CLOUD_UNIFORM_BUCKET_ACCESS=${GOOGLE_CLOUD_UNIFORM_BUCKET_ACCESS}
            # Azure Blob Storage (provide EITHER connection string OR account name + key)
            - AZURE_BLOB_STORAGE_CONNECTION_STRING=${AZURE_BLOB_STORAGE_CONNECTION_STRING}
            - AZURE_BLOB_STORAGE_ACCOUNT_NAME=${AZURE_BLOB_STORAGE_ACCOUNT_NAME}
            - AZURE_BLOB_STORAGE_ACCOUNT_KEY=${AZURE_BLOB_STORAGE_ACCOUNT_KEY}
            - AZURE_BLOB_STORAGE_CONTAINER_NAME=${AZURE_BLOB_STORAGE_CONTAINER_NAME}

            # SETTINGS
            - NUMBER_OF_PROXIES=${NUMBER_OF_PROXIES}
            - CORS_ORIGINS=${CORS_ORIGINS}
            - IFRAME_ORIGINS=${IFRAME_ORIGINS}
            - FLOWISE_FILE_SIZE_LIMIT=${FLOWISE_FILE_SIZE_LIMIT}
            - SHOW_COMMUNITY_NODES=${SHOW_COMMUNITY_NODES}
            - DISABLE_FLOWISE_TELEMETRY=${DISABLE_FLOWISE_TELEMETRY}
            - DISABLED_NODES=${DISABLED_NODES}
            - MODEL_LIST_CONFIG_JSON=${MODEL_LIST_CONFIG_JSON}

            # AUTH PARAMETERS
            - APP_URL=${APP_URL}
            - JWT_AUTH_TOKEN_SECRET=${JWT_AUTH_TOKEN_SECRET}
            - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET}
            - JWT_ISSUER=${JWT_ISSUER}
            - JWT_AUDIENCE=${JWT_AUDIENCE}
            - JWT_TOKEN_EXPIRY_IN_MINUTES=${JWT_TOKEN_EXPIRY_IN_MINUTES}
            - JWT_REFRESH_TOKEN_EXPIRY_IN_MINUTES=${JWT_REFRESH_TOKEN_EXPIRY_IN_MINUTES}
            - EXPIRE_AUTH_TOKENS_ON_RESTART=${EXPIRE_AUTH_TOKENS_ON_RESTART}
            - EXPRESS_SESSION_SECRET=${EXPRESS_SESSION_SECRET}
            - PASSWORD_RESET_TOKEN_EXPIRY_IN_MINS=${PASSWORD_RESET_TOKEN_EXPIRY_IN_MINS}
            - PASSWORD_SALT_HASH_ROUNDS=${PASSWORD_SALT_HASH_ROUNDS}
            - TOKEN_HASH_SECRET=${TOKEN_HASH_SECRET}
            - SECURE_COOKIES=${SECURE_COOKIES}

            # EMAIL
            - SMTP_HOST=${SMTP_HOST}
            - SMTP_PORT=${SMTP_PORT}
            - SMTP_USER=${SMTP_USER}
            - SMTP_PASSWORD=${SMTP_PASSWORD}
            - SMTP_SECURE=${SMTP_SECURE}
            - ALLOW_UNAUTHORIZED_CERTS=${ALLOW_UNAUTHORIZED_CERTS}
            - SENDER_EMAIL=${SENDER_EMAIL}

            # ENTERPRISE
            - LICENSE_URL=${LICENSE_URL}
            - FLOWISE_EE_LICENSE_KEY=${FLOWISE_EE_LICENSE_KEY}
            - OFFLINE=${OFFLINE}
            - INVITE_TOKEN_EXPIRY_IN_HOURS=${INVITE_TOKEN_EXPIRY_IN_HOURS}
            - WORKSPACE_INVITE_TEMPLATE_PATH=${WORKSPACE_INVITE_TEMPLATE_PATH}

            # METRICS COLLECTION
            - POSTHOG_PUBLIC_API_KEY=${POSTHOG_PUBLIC_API_KEY}
            - ENABLE_METRICS=${ENABLE_METRICS}
            - METRICS_PROVIDER=${METRICS_PROVIDER}
            - METRICS_INCLUDE_NODE_METRICS=${METRICS_INCLUDE_NODE_METRICS}
            - METRICS_SERVICE_NAME=${METRICS_SERVICE_NAME}
            - METRICS_OPEN_TELEMETRY_METRIC_ENDPOINT=${METRICS_OPEN_TELEMETRY_METRIC_ENDPOINT}
            - METRICS_OPEN_TELEMETRY_PROTOCOL=${METRICS_OPEN_TELEMETRY_PROTOCOL}
            - METRICS_OPEN_TELEMETRY_DEBUG=${METRICS_OPEN_TELEMETRY_DEBUG}

            # PROXY
            - GLOBAL_AGENT_HTTP_PROXY=${GLOBAL_AGENT_HTTP_PROXY}
            - GLOBAL_AGENT_HTTPS_PROXY=${GLOBAL_AGENT_HTTPS_PROXY}
            - GLOBAL_AGENT_NO_PROXY=${GLOBAL_AGENT_NO_PROXY}

            # QUEUE CONFIGURATION
            - MODE=${MODE}
            - QUEUE_NAME=${QUEUE_NAME}
            - QUEUE_REDIS_EVENT_STREAM_MAX_LEN=${QUEUE_REDIS_EVENT_STREAM_MAX_LEN}
            - WORKER_CONCURRENCY=${WORKER_CONCURRENCY}
            - REMOVE_ON_AGE=${REMOVE_ON_AGE}
            - REMOVE_ON_COUNT=${REMOVE_ON_COUNT}
            - REDIS_URL=${REDIS_URL}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PORT=${REDIS_PORT}
            - REDIS_USERNAME=${REDIS_USERNAME}
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - REDIS_TLS=${REDIS_TLS}
            - REDIS_CERT=${REDIS_CERT}
            - REDIS_KEY=${REDIS_KEY}
            - REDIS_CA=${REDIS_CA}
            - REDIS_KEEP_ALIVE=${REDIS_KEEP_ALIVE}
            - ENABLE_BULLMQ_DASHBOARD=${ENABLE_BULLMQ_DASHBOARD}

            # SECURITY
            - CUSTOM_MCP_SECURITY_CHECK=${CUSTOM_MCP_SECURITY_CHECK}
            - CUSTOM_MCP_PROTOCOL=${CUSTOM_MCP_PROTOCOL}
            - HTTP_DENY_LIST=${HTTP_DENY_LIST}
            - HTTP_SECURITY_CHECK=${HTTP_SECURITY_CHECK}
            - PATH_TRAVERSAL_SAFETY=${PATH_TRAVERSAL_SAFETY}
            - TRUST_PROXY=${TRUST_PROXY}
        ports:
            - '${PORT:-3000}:${PORT:-3000}'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/ping']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        volumes:
            - ~/.flowise:/root/.flowise
        entrypoint: /bin/sh -c "sleep 3; flowise start"

    eval-api:
        build:
            context: ./streamlit
            dockerfile: Dockerfile
        restart: always
        env_file:
            - ./streamlit/.env
        environment:
            - CHROMA_ENABLED=0
            - DEEPEVAL_RESULTS_FOLDER=data/deepeval_results
            - USE_LOCAL_MODEL=1
            - USE_OPENAI_MODEL=0
            - LOCAL_MODEL_HOST=host.docker.internal
            - LM_STUDIO_PORT=1234
            - LOCAL_MODEL_NAME=nvidia/nemotron-3-nano-4b
            - LOCAL_MODEL_BASE_URL=http://host.docker.internal:1234/v1
            - LOCAL_MODEL_API_KEY=lm-studio
            - DEEPEVAL_PER_ATTEMPT_TIMEOUT_SECONDS_OVERRIDE=300
            - EVAL_API_TOKEN=${EVAL_API_TOKEN:-}
            - EVAL_API_ALLOW_BASELINE=${EVAL_API_ALLOW_BASELINE:-0}
            - EVAL_API_MAX_LIMIT=${EVAL_API_MAX_LIMIT:-10}
        ports:
            - '${EVAL_API_PORT:-8504}:8504'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - ./streamlit/data:/app/data
            - ./streamlit/eval:/app/eval
            - ./streamlit/eval_api.py:/app/eval_api.py
            - ./streamlit/api_security.py:/app/api_security.py
        command: ['uvicorn', 'eval_api:app', '--host', '0.0.0.0', '--port', '8504']
        healthcheck:
            test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8504/health')"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 25s

    ml-api:
        build:
            context: ./streamlit
            dockerfile: Dockerfile
        restart: always
        env_file:
            - ./streamlit/.env
        environment:
            - CHROMA_ENABLED=0
            - DUCKDB_SOURCE_DIR=${DUCKDB_SOURCE_DIR:-data}
            - ML_API_TOKEN=${ML_API_TOKEN:-}
        ports:
            - '${ML_API_PORT:-8503}:8503'
        volumes:
            - ./streamlit/data:/app/data
            - ./streamlit/ml/models:/app/ml/models
        command: ["uvicorn", "ml_api:app", "--host", "0.0.0.0", "--port", "8503"]
        healthcheck:
            test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8503/health')"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 20s

    streamlit:
        build:
            context: ./streamlit
            dockerfile: Dockerfile
        restart: always
        env_file:
            - ./streamlit/.env
        environment:
            - CHAT_BACKEND=flowise
            - CHROMA_ENABLED=0
        ports:
            - '${STREAMLIT_PORT:-8502}:8501'
        volumes:
            - ./streamlit/data:/app/data
            - ./streamlit/ml/models:/app/ml/models
        depends_on:
            flowise:
                condition: service_healthy
            ml-api:
                condition: service_healthy

    # Guardrails demo: .\run-guardrails-demo.ps1
    streamlit-guardrails:
        build:
            context: ./streamlit
            dockerfile: Dockerfile
        profiles: ["guardrails"]
        volumes:
            - ../docs:/docs
            - ./streamlit/guardrails.py:/app/guardrails.py
            - ./streamlit/guardrails_demo.py:/app/guardrails_demo.py
            - ./streamlit/api_security.py:/app/api_security.py
            - ./streamlit/test_guardrails.py:/app/test_guardrails.py
        working_dir: /app
        command:
            [
                "sh",
                "-c",
                "python test_guardrails.py -v && python guardrails_demo.py --out /docs/guardrails-demo.md",
            ]

    # DeepEval: .\run-eval.ps1  (ou docker compose --profile eval run --rm streamlit-eval)
    streamlit-eval:
        build:
            context: ./streamlit
            dockerfile: Dockerfile
        profiles: ["eval"]
        env_file:
            - ./streamlit/.env
        environment:
            CHROMA_ENABLED: "0"
            USE_LOCAL_MODEL: "1"
            USE_OPENAI_MODEL: "0"
            LOCAL_MODEL_HOST: host.docker.internal
            LM_STUDIO_PORT: "1234"
            LOCAL_MODEL_NAME: nvidia/nemotron-3-nano-4b:4
            LOCAL_MODEL_BASE_URL: http://host.docker.internal:1234/v1
            LOCAL_MODEL_API_KEY: lm-studio
            DEEPEVAL_PER_ATTEMPT_TIMEOUT_SECONDS_OVERRIDE: "300"
            DEEPEVAL_RESULTS_FOLDER: data/deepeval_results
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./streamlit/data:/app/data
            - ./streamlit/eval:/app/eval
        depends_on:
            flowise:
                condition: service_healthy
        working_dir: /app
        command: ["python", "eval/run_eval.py"]
